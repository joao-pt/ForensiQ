# Hooks locais executados antes de cada commit.
# Instalar uma vez: `pre-commit install`.
# Correr manualmente em todo o repo: `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/.*\.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^src/backend/.*\.py$
      - id: ruff-format
        files: ^src/backend/.*\.py$

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3
        files: ^src/backend/.*\.py$

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.85.0
    hooks:
      - id: semgrep
        args: ["--config=p/owasp-top-ten", "--config=p/django", "--error", "--skip-unknown-extensions"]
        files: ^src/backend/.*\.py$
