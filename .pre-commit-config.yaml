# Hooks locais executados antes de cada commit.
# Instalar uma vez: `pre-commit install`.
# Correr manualmente em todo o repo: `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^docs/.*\.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13          # alinhado com o ruff do CI (.github/workflows/ci.yml)
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^src/backend/.*\.py$

# Sem formatador no pre-commit (black/ruff-format removidos): o codebase NÃO está
# black-formatado (41/105 ficheiros divergem) — ativá-lo encheria os commits de
# reformatações cosméticas em ficheiros não tocados; o CI também só corre
# `ruff check` (sem formatador). O gate útil aqui é o ruff (lint) acima, alinhado
# ao CI (apanha imports órfãos/F401 antes do push). Uniformizar tudo com black um
# dia, em commit dedicado: `black src/backend`.
# semgrep removido: o env do hook rebenta no Windows e NÃO é gate do CI (a SAST do
# CI é Bandit + Trivy). À mão: PYTHONUTF8=1 semgrep --config=p/django src/backend
