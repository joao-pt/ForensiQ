{% extends "base.html" %}
{% load static %}

{% block title %}ForensiQ — Painel{% endblock %}

{% block content %}
<!-- Cabeçalho do dashboard -->
<div class="dashboard-header" id="dashboard-header">
    <h2 id="greeting"></h2>
    <p id="profile-info"></p>
</div>

<!-- Estatísticas rápidas -->
<div class="stats-grid" id="stats-grid">
    <div class="stat-card">
        <div class="stat-value" id="stat-occurrences">-</div>
        <div class="stat-label">Ocorrências</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="stat-evidences">-</div>
        <div class="stat-label">Evidências</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="stat-devices">-</div>
        <div class="stat-label">Dispositivos</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" id="stat-custody">-</div>
        <div class="stat-label">Custódia</div>
    </div>
</div>

<!-- Acções rápidas — AGENT -->
<div id="agent-actions" class="hidden">
    <h3 class="mb-8" style="font-size: 0.875rem; text-transform: uppercase; color: var(--text-light); letter-spacing: 0.5px;">
        Acções rápidas
    </h3>
    <div class="quick-actions">
        <button class="action-btn" data-nav="/occurrences/new/">
            <div class="action-icon blue">+</div>
            <div class="action-text">
                <strong>Nova Ocorrência</strong>
                <small>Registar cena de crime</small>
            </div>
        </button>
        <button class="action-btn" data-nav="/evidences/new/">
            <div class="action-icon green">+</div>
            <div class="action-text">
                <strong>Nova Evidência</strong>
                <small>Apreender prova digital</small>
            </div>
        </button>
        <button class="action-btn" data-nav="/occurrences/">
            <div class="action-icon orange">&#128269;</div>
            <div class="action-text">
                <strong>Ocorrências</strong>
                <small>Ver todas as ocorrências</small>
            </div>
        </button>
        <button class="action-btn" data-nav="/evidences/">
            <div class="action-icon red">&#128270;</div>
            <div class="action-text">
                <strong>Evidências</strong>
                <small>Consultar evidências</small>
            </div>
        </button>
    </div>
</div>

<!-- Acções rápidas — EXPERT -->
<div id="expert-actions" class="hidden">
    <h3 class="mb-8" style="font-size: 0.875rem; text-transform: uppercase; color: var(--text-light); letter-spacing: 0.5px;">
        Acções rápidas
    </h3>
    <div class="quick-actions">
        <button class="action-btn" data-nav="/custody/">
            <div class="action-icon blue">&#128279;</div>
            <div class="action-text">
                <strong>Cadeia de Custódia</strong>
                <small>Gerir transferências</small>
            </div>
        </button>
        <button class="action-btn" data-nav="/evidences/">
            <div class="action-icon green">&#128269;</div>
            <div class="action-text">
                <strong>Evidências</strong>
                <small>Consultar evidências em perícia</small>
            </div>
        </button>
        <button class="action-btn" data-nav="/occurrences/">
            <div class="action-icon orange">&#128196;</div>
            <div class="action-text">
                <strong>Ocorrências</strong>
                <small>Ver todas as ocorrências</small>
            </div>
        </button>
    </div>
</div>

<!-- Últimas ocorrências -->
<div class="card mt-24">
    <div class="card-header">
        <div>
            <div class="card-title">Últimas ocorrências</div>
            <div class="card-subtitle">As mais recentes</div>
        </div>
    </div>
    <div id="recent-occurrences">
        <div class="loading-overlay">
            <div class="spinner spinner-dark"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/toast.js' %}"></script>
<script src="{% static 'js/pages/dashboard.js' %}"></script>
{% endblock %}
