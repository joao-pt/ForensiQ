{% load static %}
<!DOCTYPE html>
<html lang="pt-PT" data-theme="midnight">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0B1220" id="meta-theme-color">
    <meta name="description" content="ForensiQ — Gestão de Prova Digital para First Responders">
    <title>{% block title %}ForensiQ{% endblock %}</title>

    <!-- Mobile-first: prevenir zoom em inputs (iOS) -->
    <meta name="format-detection" content="telephone=no">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">

    <!-- Tema — aplica antes do primeiro paint para evitar flash -->
    <script src="{% static 'js/theme-init.js' %}"></script>

    <!-- CSS principal -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}

    <!-- Tipografia forense: Inter (UI) + JetBrains Mono (hashes, IDs, timestamps) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap">

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; connect-src 'self' https://nominatim.openstreetmap.org; img-src 'self' data: https://*.tile.openstreetmap.org https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; base-uri 'self';">
</head>
<body>
    <!-- Barra de navegação (oculta na página de login) -->
    {% block navbar %}
    <nav class="navbar" id="navbar">
        <div class="navbar-left">
            <a href="/dashboard/" class="navbar-logo" title="ForensiQ — Início">
                <svg class="seal-logo" viewBox="0 0 64 64" aria-hidden="true">
                    <circle cx="32" cy="32" r="30" fill="var(--accent)"/>
                    <circle cx="32" cy="32" r="30" fill="none" stroke="#fff"
                            stroke-width="2" stroke-dasharray="4 3" opacity="0.4"/>
                    <circle cx="32" cy="32" r="23" fill="none" stroke="#fff"
                            stroke-width="0.75" opacity="0.15"/>
                    <text x="30" y="43" text-anchor="middle"
                          font-family="Inter,system-ui,sans-serif" font-weight="800"
                          font-size="30" fill="#fff" letter-spacing="-1">Q</text>
                    <line x1="39" y1="40" x2="49" y2="50" stroke="#fff"
                          stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
                </svg>
            </a>
            <nav class="breadcrumb" id="breadcrumb" aria-label="Navegação">
                {% block breadcrumb %}<span>Início</span>{% endblock %}
            </nav>
        </div>
        <div class="navbar-actions">
            <button class="theme-toggle" id="theme-toggle"
                    title="Alternar tema" aria-label="Alternar tema">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 3v18a9 9 0 000-18z" fill="currentColor" stroke="none"/>
                </svg>
            </button>
            <span class="navbar-user" id="navbar-user"></span>
            <button class="btn btn-sm btn-outline" id="btn-logout" title="Terminar sessão">
                Sair
            </button>
        </div>
    </nav>
    {% endblock %}

    <!-- Conteúdo principal -->
    <main class="container" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Notificações / alertas -->
    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts base -->
    <script src="{% static 'js/config.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/theme-switch.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
