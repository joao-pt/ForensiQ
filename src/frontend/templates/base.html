{% load static %}
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a237e">
    <meta name="description" content="ForensiQ — Gestão de Prova Digital para First Responders">
    <title>{% block title %}ForensiQ{% endblock %}</title>

    <!-- Mobile-first: prevenir zoom em inputs (iOS) -->
    <meta name="format-detection" content="telephone=no">

    <!-- CSS principal -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Barra de navegação (oculta na página de login) -->
    {% block navbar %}
    <nav class="navbar" id="navbar">
        <div class="navbar-brand">
            <span class="navbar-logo">FQ</span>
            <span class="navbar-title">ForensiQ</span>
        </div>
        <div class="navbar-actions">
            <span class="navbar-user" id="navbar-user"></span>
            <button class="btn btn-sm btn-outline" id="btn-logout" title="Terminar sessão">
                Sair
            </button>
        </div>
    </nav>
    {% endblock %}

    <!-- Conteúdo principal -->
    <main class="container" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Notificações / alertas -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts base -->
    <script src="{% static 'js/config.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/api.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
