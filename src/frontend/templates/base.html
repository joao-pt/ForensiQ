{% load static %}
<!DOCTYPE html>
<html lang="pt-PT" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F1115" id="meta-theme-color">
    <meta name="description" content="ForensiQ — Gestão de Prova Digital para First Responders">
    <title>{% block title %}ForensiQ{% endblock %}</title>

    <!-- Mobile-first: prevenir zoom em inputs (iOS) -->
    <meta name="format-detection" content="telephone=no">

    <!-- Favicon — cadeia de custódia (aros entrelaçados) -->
    <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">

    <!-- Tema — aplica antes do primeiro paint para evitar flash (FOUC) -->
    <script src="{% static 'js/theme-init.js' %}"></script>

    <!-- CSS principal -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}

    <!-- Tipografia forense: Inter (UI) + JetBrains Mono (hashes, IDs, timestamps) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap">

</head>
<body>
    <!-- Região live para anúncios de tema a leitores de ecrã -->
    <div id="theme-announce" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

    <!-- Barra de navegação (login.html anula este bloco para ficar oculta). -->
    {% block navbar %}
    <nav class="navbar" id="navbar" aria-label="Principal">
        <div class="nav-left">
            <a href="/dashboard/" class="nav-brand" title="ForensiQ — Início">
                <svg class="nav-brand-mark" viewBox="0 0 56 48" aria-hidden="true">
                    <defs>
                        <mask id="nav-interlock" maskUnits="userSpaceOnUse">
                            <rect x="0" y="0" width="56" height="48" fill="white"/>
                            <rect x="24" y="28.5" width="8" height="7" fill="black"/>
                        </mask>
                    </defs>
                    <circle cx="22" cy="24" r="10" fill="none"
                            stroke="var(--accent)" stroke-width="2.5"/>
                    <circle cx="34" cy="24" r="10" fill="none"
                            stroke="currentColor" stroke-width="2.5"
                            mask="url(#nav-interlock)"/>
                </svg>
                <span class="nav-brand-name">ForensiQ</span>
            </a>
            <nav class="breadcrumb" aria-label="Navegação">
                {% block breadcrumb %}<span class="breadcrumb-current">Início</span>{% endblock %}
            </nav>
        </div>

        <div class="nav-right">
            <!-- Alternar tema (dia / noite) -->
            <button type="button" class="icon-btn" id="theme-toggle"
                    title="Alternar tema" aria-label="Alternar tema"
                    aria-pressed="false">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
                </svg>
            </button>

            <!-- Menu de utilizador -->
            <div class="user-menu">
                <button type="button" class="user-menu-trigger" id="user-menu-trigger"
                        aria-haspopup="menu" aria-expanded="false" aria-controls="user-menu-panel">
                    <span class="user-avatar" id="user-avatar" aria-hidden="true">—</span>
                    <span class="user-menu-name" id="user-menu-name">Utilizador</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
                         width="14" height="14">
                        <path d="m6 9 6 6 6-6"/>
                    </svg>
                </button>

                <div class="user-menu-panel" id="user-menu-panel" role="menu" hidden>
                    <div class="user-menu-header">
                        <div class="user-menu-header-name" id="user-menu-full-name">—</div>
                        <div class="user-menu-header-role" id="user-menu-role">—</div>
                    </div>

                    <a href="/stats/" class="user-menu-item" role="menuitem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 20h18M6 16V9M11 16V5M16 16v-8M21 16V11"/>
                        </svg>
                        Estatísticas
                    </a>
                    <a href="/reports/" class="user-menu-item" role="menuitem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                            <path d="M14 3v6h6M9 13h6M9 17h4"/>
                        </svg>
                        Relatórios PDF
                    </a>
                    <a href="/settings/" class="user-menu-item" role="menuitem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h0a1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
                        </svg>
                        Definições
                    </a>

                    <hr>

                    <button type="button" class="user-menu-item danger" id="btn-logout" role="menuitem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <path d="m16 17 5-5-5-5M21 12H9"/>
                        </svg>
                        Terminar sessão
                    </button>
                </div>
            </div>
        </div>
    </nav>
    {% endblock %}

    <!-- Conteúdo principal -->
    <main class="container" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Notificações / alertas -->
    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Scripts base -->
    <script src="{% static 'js/config.js' %}"></script>
    <script src="{% static 'js/icons.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
    <script src="{% static 'js/api.js' %}"></script>
    <script src="{% static 'js/components/data-table.js' %}"></script>
    <script src="{% static 'js/theme-switch.js' %}"></script>
    <script src="{% static 'js/user-menu.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
