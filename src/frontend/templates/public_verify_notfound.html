{% load static %}
<!DOCTYPE html>
<html lang="pt-PT" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F1115">
  <meta name="robots" content="noindex">
  <title>Não encontrado — ForensiQ</title>
  <script src="{% static 'js/theme-init.js' %}"></script>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="{% static 'css/components/forensic.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <main class="pubdoc">
    <div class="pubdoc__brand">
      <svg viewBox="0 0 56 48" aria-hidden="true">
        <circle cx="22" cy="24" r="10" fill="none" stroke="var(--accent)" stroke-width="2.5"/>
        <circle cx="34" cy="24" r="10" fill="none" stroke="currentColor" stroke-width="2.5"/>
      </svg>
      ForensiQ
    </div>
    <h1 class="pubdoc__title">Referência não encontrada</h1>
    <p class="pubdoc__sub">O código de verificação não corresponde a nenhuma ocorrência, ou o seu segredo foi rotacionado.</p>

  </main>

</html>
