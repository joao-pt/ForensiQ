{% extends "base.html" %}
{% load static %}

{% block title %}ForensiQ — Iniciar Sessão{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">FQ</div>
            <h1>ForensiQ</h1>
            <p>Gestão de Prova Digital</p>
        </div>

        <!-- Mensagem de erro -->
        <div class="login-error" id="login-error"></div>

        <!-- Formulário de login -->
        <form id="login-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="username">Utilizador</label>
                <input
                    class="form-input"
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Nome de utilizador"
                    autocomplete="username"
                    autocapitalize="none"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Palavra-passe</label>
                <input
                    class="form-input"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Palavra-passe"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button class="btn btn-primary btn-block mt-8" type="submit" id="btn-login">
                Entrar
            </button>
        </form>

        <p class="text-center text-muted mt-16" style="font-size: 0.75rem;">
            ForensiQ v0.1 &middot; UC 21184 &middot; Universidade Aberta
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/toast.js' %}"></script>
<script src="{% static 'js/pages/login.js' %}"></script>
{% endblock %}
