{% extends "base.html" %}
{% load static %}

{% block title %}ForensiQ — Iniciar Sessão{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">FQ</div>
            <h1>ForensiQ</h1>
            <p>Gestão de Prova Digital</p>
        </div>

        <!-- Mensagem de erro -->
        <div class="login-error" id="login-error"></div>

        <!-- Formulário de login -->
        <form id="login-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="username">Utilizador</label>
                <input
                    class="form-input"
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Nome de utilizador"
                    autocomplete="username"
                    autocapitalize="none"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Palavra-passe</label>
                <input
                    class="form-input"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Palavra-passe"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button class="btn btn-primary btn-block mt-8" type="submit" id="btn-login">
                Entrar
            </button>
        </form>

        <p class="text-center text-muted mt-16" style="font-size: 0.75rem;">
            ForensiQ v0.1 &middot; UC 21184 &middot; Universidade Aberta
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/toast.js' %}"></script>
<script>
'use strict';

document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const btnLogin = document.getElementById('btn-login');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    // Se já estiver autenticado, redirecionar para o dashboard
    Auth.isAuthenticated().then(authenticated => {
        if (authenticated) {
            window.location.href = '/dashboard/';
        }
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        // Validação básica
        if (!username || !password) {
            showError('Preencha o nome de utilizador e a palavra-passe.');
            return;
        }

        // Desactivar botão durante o pedido
        btnLogin.disabled = true;
        btnLogin.innerHTML = '<span class="spinner"></span>';

        try {
            const user = await Auth.login(username, password);
            // Redirecionar para o dashboard
            window.location.href = '/dashboard/';
        } catch (err) {
            showError(err.message || 'Credenciais inválidas. Tente novamente.');
            btnLogin.disabled = false;
            btnLogin.textContent = 'Entrar';
            passwordInput.value = '';
            passwordInput.focus();
        }
    });

    function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.add('visible');
    }

    // Foco automático no primeiro campo
    usernameInput.focus();
});
</script>
{% endblock %}
