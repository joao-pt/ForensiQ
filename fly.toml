# fly.toml app configuration file generated for forensiq on 2026-03-29T16:19:29+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "forensiq"
primary_region = "fra"

[build]
dockerfile = "Dockerfile"

[deploy]
release_command = "python manage.py migrate --noinput"

[env]
ALLOWED_HOSTS = "forensiq.pt,www.forensiq.pt,forensiq.fly.dev,localhost,.internal"
DEBUG = "False"
MEDIA_ROOT = "/data/media"
USE_X_FORWARDED_PROTO = "true"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8000
min_machines_running = 0
processes = ["app"]

  [[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "get"
  path = "/api/health/"
  protocol = "http"
  timeout = "2s"
  tls_skip_verify = false
    [http_service.checks.headers]
    Host = "forensiq.fly.dev"
    X-Forwarded-Proto = "https"

  [http_service.concurrency]
  hard_limit = 250
  soft_limit = 200
  type = "requests"

[[mounts]]
destination = "/data/media"
initial_size = "1"
source = "forensiq_media"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "512mb"
memory_mb = 512